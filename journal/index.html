<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Journal de bord — prospection (privé)</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#161a1d;--paper:#f4f1ea;--card:#fffdf9;--gold:#b0895a;--gold-d:#98723f;--line:#e7e0d4;--muted:#8a8072;--soft:#6b6357;--red:#c0472e;--amber:#c98a2a;--green:#2f8f5b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased;padding:22px 15px 70px;}
  .wrap{max-width:820px;margin:0 auto;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.8rem;margin-bottom:3px;}
  .sub{color:var(--muted);font-size:.86rem;margin-bottom:16px;}
  .priv{font-size:.76rem;color:var(--gold-d);background:rgba(176,137,90,.12);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-bottom:16px;}
  .banner{border-radius:10px;padding:13px 16px;margin-bottom:16px;font-size:.9rem;font-weight:600;display:none;}
  .banner.show{display:block;}
  .banner.due{background:rgba(192,71,46,.1);border:1px solid rgba(192,71,46,.4);color:var(--red);}
  .banner.ok{background:rgba(47,143,91,.1);border:1px solid rgba(47,143,91,.4);color:var(--green);}
  .bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .bar button{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:9px 14px;font-family:inherit;font-size:.83rem;font-weight:600;color:var(--gold-d);cursor:pointer;}
  .bar button.primary{background:var(--gold);color:#fff;border-color:var(--gold);}
  .add{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:20px;display:none;}
  .add.show{display:block;}
  .add .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  @media(max-width:560px){.add .row{grid-template-columns:1fr;}}
  .add label{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:3px;}
  .add input,.add select,.add textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:.9rem;background:var(--paper);}
  .add .save{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:11px 20px;font-family:inherit;font-weight:600;cursor:pointer;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:11px;border-left:4px solid var(--line);}
  .card.due{border-left-color:var(--red);}
  .card.soon{border-left-color:var(--amber);}
  .card.done{border-left-color:var(--green);opacity:.72;}
  .card .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .card .n{font-family:'Fraunces',serif;font-weight:600;font-size:1.1rem;}
  .card .st{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(176,137,90,.14);color:var(--gold-d);white-space:nowrap;}
  .card .meta{font-size:.83rem;color:var(--soft);margin:5px 0 8px;}
  .card .meta a{color:var(--gold-d);}
  .card .tag-due{color:var(--red);font-weight:700;}
  .card .tag-soon{color:var(--amber);font-weight:700;}
  .card .note{font-size:.85rem;color:var(--soft);font-style:italic;margin-bottom:9px;}
  .card .acts{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
  .card .acts button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 11px;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--ink);}
  .card .acts button.ok{background:var(--green);color:#fff;border-color:var(--green);}
  .card .acts button.del{color:var(--red);border-color:rgba(192,71,46,.3);}
  .card .acts label{font-size:.75rem;color:var(--muted);margin-left:auto;}
  .card .acts input[type=date],.card .acts select{border:1px solid var(--line);border-radius:6px;padding:5px 7px;font-family:inherit;font-size:.8rem;background:#fff;}
  .empty{text-align:center;color:var(--muted);padding:30px;font-size:.9rem;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Journal de bord — prospection</h1>
  <div class="sub">Tes prospects, leurs relances, et un rappel quand c'est le moment.</div>
  <div class="priv">🔒 Privé · tout est stocké dans TON navigateur (rien en ligne). Ouvre cette page depuis le même appareil.</div>

  <div id="banner" class="banner"></div>

  <div class="bar">
    <button class="primary" id="addBtn">+ Ajouter un prospect</button>
    <button id="notifBtn">🔔 Activer les rappels</button>
    <button id="seedBtn">Charger mes prospects</button>
  </div>

  <div class="add" id="addBox">
    <div class="row">
      <div><label>Nom / entreprise</label><input id="f-name" placeholder="Kenyon Roofing"></div>
      <div><label>Contact (tel / email)</label><input id="f-contact" placeholder="07541 836665"></div>
    </div>
    <div class="row">
      <div><label>Canal</label><select id="f-channel"><option>WhatsApp</option><option>Email</option><option>Facebook</option><option>Téléphone</option><option>En personne</option></select></div>
      <div><label>Statut</label><select id="f-status"><option>À contacter</option><option>Contacté</option><option>Relancé 1</option><option>Relancé 2</option><option>Intéressé</option><option>Devis envoyé</option><option>Client ✅</option><option>Pas intéressé</option></select></div>
    </div>
    <div class="row">
      <div><label>Prochaine relance (date)</label><input id="f-next" type="date"></div>
      <div><label>Note</label><input id="f-note" placeholder="Attend la maquette…"></div>
    </div>
    <button class="save" id="saveBtn">Enregistrer</button>
  </div>

  <div id="list"></div>
</div>

<script>
(function(){
  var KEY="mc_journal_v1";
  var list=document.getElementById("list");
  var banner=document.getElementById("banner");
  function load(){ try{ return JSON.parse(localStorage.getItem(KEY)||"[]"); }catch(e){ return []; } }
  function save(a){ try{ localStorage.setItem(KEY, JSON.stringify(a)); }catch(e){} }
  var data=load();

  function today(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
  function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function plusDays(n){ var d=today(); d.setDate(d.getDate()+n); return iso(d); }
  function dueState(e){
    if(e.status==="Client ✅"||e.status==="Pas intéressé") return "done";
    if(!e.next) return "";
    var n=new Date(e.next+"T00:00:00"); var t=today();
    var diff=Math.round((n-t)/86400000);
    if(diff<=0) return "due";
    if(diff<=1) return "soon";
    return "";
  }
  function fmtDate(s){ if(!s) return "—"; var p=s.split("-"); return p[2]+"/"+p[1]; }

  function render(){
    data.sort(function(a,b){ return (a.next||"9999").localeCompare(b.next||"9999"); });
    save(data);
    if(!data.length){ list.innerHTML='<div class="empty">Aucun prospect encore. Clique « Charger mes prospects » ou « + Ajouter ».</div>'; }
    else{
      list.innerHTML="";
      data.forEach(function(e){
        var s=dueState(e);
        var d=document.createElement("div"); d.className="card "+s;
        var dueTxt="";
        if(s==="due") dueTxt='<span class="tag-due">⚠ À relancer</span>';
        else if(s==="soon") dueTxt='<span class="tag-soon">⏳ Bientôt</span>';
        var contact=e.contact?('· <a href="'+(e.contact.indexOf("@")>-1?"mailto:":"tel:")+e.contact.replace(/\s/g,"")+'">'+e.contact+"</a>"):"";
        d.innerHTML='<div class="top"><span class="n">'+esc(e.name)+'</span><span class="st">'+esc(e.status)+'</span></div>'
          +'<div class="meta">'+esc(e.channel)+" "+contact+' · Relance : <b>'+fmtDate(e.next)+"</b> "+dueTxt+"</div>"
          +(e.note?'<div class="note">'+esc(e.note)+"</div>":"")
          +'<div class="acts">'
            +'<button class="ok" data-a="done">✓ Relancé (+4j)</button>'
            +'<button data-a="int">Intéressé</button>'
            +'<button class="del" data-a="del">Supprimer</button>'
            +'<label>Relance <input type="date" data-a="date" value="'+(e.next||"")+'"></label>'
          +"</div>";
        d.querySelector('[data-a=done]').onclick=function(){ e.status=(e.status==="Contacté"?"Relancé 1":(e.status==="Relancé 1"?"Relancé 2":e.status)); e.next=plusDays(4); render(); };
        d.querySelector('[data-a=int]').onclick=function(){ e.status="Intéressé"; e.next=plusDays(1); render(); };
        d.querySelector('[data-a=del]').onclick=function(){ if(confirm("Supprimer "+e.name+" ?")){ data=data.filter(function(x){return x!==e;}); render(); } };
        d.querySelector('[data-a=date]').onchange=function(ev){ e.next=ev.target.value; render(); };
        list.appendChild(d);
      });
    }
    updateBanner();
  }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  function dueList(){ return data.filter(function(e){ return dueState(e)==="due"; }); }
  function updateBanner(){
    var due=dueList();
    if(due.length){ banner.className="banner due show"; banner.textContent="⚠ "+due.length+" prospect(s) à relancer aujourd'hui : "+due.map(function(e){return e.name;}).join(", "); }
    else{ banner.className="banner ok show"; banner.textContent="✅ Rien à relancer aujourd'hui. Beau travail 🌙"; }
  }

  document.getElementById("addBtn").onclick=function(){ document.getElementById("addBox").classList.toggle("show"); document.getElementById("f-next").value=plusDays(4); };
  document.getElementById("saveBtn").onclick=function(){
    var name=document.getElementById("f-name").value.trim(); if(!name){ alert("Ajoute un nom."); return; }
    data.push({ name:name, contact:document.getElementById("f-contact").value.trim(), channel:document.getElementById("f-channel").value, status:document.getElementById("f-status").value, next:document.getElementById("f-next").value, note:document.getElementById("f-note").value.trim() });
    ["f-name","f-contact","f-note"].forEach(function(id){ document.getElementById(id).value=""; });
    document.getElementById("addBox").classList.remove("show");
    render();
  };

  document.getElementById("notifBtn").onclick=function(){
    if(!("Notification" in window)){ alert("Ton navigateur ne gère pas les notifications."); return; }
    Notification.requestPermission().then(function(p){
      if(p==="granted"){ notifyDue(true); alert("Rappels activés ✅ Tu recevras une notif à l'ouverture de cette page s'il y a des relances dues."); }
      else alert("Notifications refusées — tu verras quand même les relances en haut de la page.");
    });
  };
  function notifyDue(force){
    var due=dueList();
    if(!due.length) return;
    if(window.Notification && Notification.permission==="granted"){
      try{ new Notification("Relances à faire 🌙", { body: due.length+" prospect(s) à relancer : "+due.map(function(e){return e.name;}).join(", "), tag:"mc-journal" }); }catch(e){}
    }
  }

  document.getElementById("seedBtn").onclick=function(){
    if(data.length && !confirm("Ajouter tes prospects connus à la liste existante ?")) return;
    var seed=[
      {name:"Kenyon Roofing (Jimmy)",contact:"07541 836665",channel:"WhatsApp",status:"Contacté",next:plusDays(0),note:"Maquette prête sur /toitures — envoyer + relancer"},
      {name:"Malta Prime Properties",contact:"admin@maltaprimeproperties.com",channel:"Email",status:"Contacté",next:plusDays(4),note:""},
      {name:"Perry Estate Agents",contact:"07949 491074",channel:"WhatsApp",status:"Contacté",next:plusDays(4),note:"A déjà un 'chat' (file d'attente)"},
      {name:"Giovanni Estates",contact:"",channel:"Facebook",status:"Contacté",next:plusDays(4),note:""},
      {name:"Bonavia Investments",contact:"",channel:"Email",status:"À contacter",next:plusDays(1),note:"Trouver le contact"},
      {name:"Simon Mamo",contact:"info@simonmamo.com",channel:"WhatsApp",status:"Contacté",next:plusDays(4),note:""},
      {name:"Excel Homes",contact:"info@excel.com.mt",channel:"Email",status:"Contacté",next:plusDays(4),note:""},
      {name:"Prime Homes Malta (Clive)",contact:"Clive.vella@dvgroup.com.mt",channel:"WhatsApp",status:"Contacté",next:plusDays(4),note:"Clive Vella · +356 9980 1719"},
      {name:"Formosa Real Estate",contact:"jp@formosarealestate.com",channel:"Email",status:"Contacté",next:plusDays(4),note:""},
      {name:"Selective Quality Letting",contact:"",channel:"Facebook",status:"Contacté",next:plusDays(4),note:""},
      {name:"BPrime Properties",contact:"adminmosta@benestates.com",channel:"Email",status:"Contacté",next:plusDays(4),note:""}
    ];
    seed.forEach(function(s){ if(!data.some(function(d){return d.name===s.name;})) data.push(s); });
    render();
  };

  render();
  notifyDue();
})();
</script>
</body>
</html>
